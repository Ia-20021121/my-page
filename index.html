<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>はじめまして</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: white;
      border-radius: 20px;
      padding: 60px 80px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
      max-width: 560px;
      width: 90%;
    }

    .avatar {
      width: 90px;
      height: 90px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      border-radius: 50%;
      margin: 0 auto 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
    }

    h1 {
      font-size: 2rem;
      color: #333;
      margin-bottom: 16px;
      line-height: 1.4;
    }

    .subtitle {
      font-size: 1rem;
      color: #888;
      line-height: 1.8;
    }

    .divider {
      width: 50px;
      height: 3px;
      background: linear-gradient(90deg, #667eea, #764ba2);
      border-radius: 2px;
      margin: 24px auto;
    }

    .badge {
      display: inline-block;
      background: #f0edff;
      color: #764ba2;
      font-size: 0.85rem;
      padding: 6px 18px;
      border-radius: 20px;
      margin-top: 24px;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="avatar">👋</div>
    <h1>はじめまして！</h1>
    <div class="divider"></div>
    <p class="subtitle">これは私の最初のWebページです。<br>ここから少しずつ学んでいきます。</p>
    <span class="badge">My First Web Page</span>
  </div>
</body>
</html>
